<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обрезка фото</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 32px;
        }

        .upload-area {
            text-align: center;
            margin-bottom: 48px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .btn:active {
            transform: translateY(0);
        }

        #upload {
            display: none;
        }

        .preview-area {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .original-wrapper, .cropped-wrapper {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e293b;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .title-hidden {
            display: none;
        }

        .title-visible {
            display: block;
        }

        .image-container {
            background: #e2e8f0;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            position: relative;
        }

        #image {
            max-width: 100%;
            max-height: 400px;
            display: block;
            object-fit: contain;
        }

        #croppedResult {
            max-width: 100%;
            max-height: 300px;
            display: block;
            border-radius: 12px;
            border: 3px solid white;
            box-shadow: 0 0 0 2px #667eea, 0 0 0 6px rgba(102, 126, 234, 0.2);
        }

        .cropped-wrapper .btn {
            margin-top: 24px;
            width: 100%;
            justify-content: center;
            background: linear-gradient(135deg, #10b981, #059669);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            pointer-events: none;
        }

        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #94a3b8;
            text-align: center;
            background: rgba(255,255,255,0.8);
            padding: 12px 24px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            font-weight: 500;
            pointer-events: none;
            z-index: 1;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Обрезка изображения</h1>
        <div class="upload-area">
            <input type="file" id="upload" accept="image/*">
            <label for="upload" class="btn">Загрузить фото</label>
        </div>
        <div class="preview-area">
            <div class="cropped-wrapper">
                <h3 id="croppedTitle" class="title-hidden">Результат обрезки</h3>
                <div class="image-container">
                    <img id="croppedResult" src="#" alt="Результат обрезки" style="display: none;">
                    <div id="croppedPlaceholder" class="placeholder">✂️ Обрезка появится здесь</div>
                </div>
                <button id="downloadBtn" class="btn" disabled>Сохранить новое фото</button>
            </div>
            <div class="original-wrapper">
                <h3 id="originalTitle" class="title-hidden">Исходное изображение</h3>
                <div class="image-container">
                    <img id="image" src="#" alt="Исходное изображение" style="display: none;">
                    <div id="originalPlaceholder" class="placeholder">📷 Нет изображения</div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script>
        let cropper = null;
        const uploadInput = document.getElementById('upload');
        const imageElement = document.getElementById('image');
        const croppedResultImg = document.getElementById('croppedResult');
        const downloadBtn = document.getElementById('downloadBtn');
        const originalTitle = document.getElementById('originalTitle');
        const croppedTitle = document.getElementById('croppedTitle');
        const originalPlaceholder = document.getElementById('originalPlaceholder');
        const croppedPlaceholder = document.getElementById('croppedPlaceholder');

        function showImageAndHidePlaceholder(imgElement, placeholderElement) {
            imgElement.style.display = 'block';
            placeholderElement.classList.add('hidden');
        }

        function resetCropped() {
            croppedResultImg.style.display = 'none';
            croppedPlaceholder.classList.remove('hidden');
            croppedResultImg.src = '#';
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
            downloadBtn.disabled = true;
        }

        uploadInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 300 * 1024) {
                alert('Размер файла превышает 300 КБ. Пожалуйста, выберите изображение меньшего размера.');
                uploadInput.value = '';
                return;
            }

            resetCropped();
            originalTitle.classList.remove('title-hidden');
            originalTitle.classList.add('title-visible');
            croppedTitle.classList.remove('title-hidden');
            croppedTitle.classList.add('title-visible');

            const reader = new FileReader();
            reader.onload = (e) => {
                const imgUrl = e.target.result;
                imageElement.src = imgUrl;
                showImageAndHidePlaceholder(imageElement, originalPlaceholder);

                if (cropper) {
                    cropper.destroy();
                }
                cropper = new Cropper(imageElement, {
                    aspectRatio: NaN,
                    viewMode: 1,
                    autoCropArea: 0.8,
                    crop() {
                        const canvas = cropper.getCroppedCanvas();
                        if (canvas) {
                            croppedResultImg.src = canvas.toDataURL('image/png');
                            showImageAndHidePlaceholder(croppedResultImg, croppedPlaceholder);
                            downloadBtn.disabled = false;
                        }
                    }
                });
            };
            reader.readAsDataURL(file);
        });

        downloadBtn.addEventListener('click', () => {
            if (!cropper) return;
            const canvas = cropper.getCroppedCanvas();
            if (canvas) {
                const link = document.createElement('a');
                link.download = 'cropped_image.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } else {
                alert('Не удалось создать обрезанное изображение.');
            }
        });
    </script>
</body>
</html>
